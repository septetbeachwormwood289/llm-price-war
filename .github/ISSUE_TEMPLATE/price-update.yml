name: Price Update
description: Report a pricing change for an existing model
title: "[PRICE] "
labels: ["price-update"]
body:
  - type: input
    id: provider
    attributes:
      label: Provider
      placeholder: "e.g., OpenAI, Anthropic, Google"
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model
      placeholder: "e.g., GPT-4o, Claude Sonnet 4"
    validations:
      required: true
  - type: input
    id: old_price
    attributes:
      label: Old price (input/output per 1M tokens)
      placeholder: "e.g., $2.50 / $10.00"
  - type: input
    id: new_price
    attributes:
      label: New price (input/output per 1M tokens)
      placeholder: "e.g., $2.00 / $8.00"
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Source URL
      placeholder: "Link to official pricing page"
    validations:
      required: true
