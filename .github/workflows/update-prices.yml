name: Update Prices

on:
  schedule:
    - cron: '0 0 * * *'  # Midnight UTC daily
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run price updater
        id: update
        run: |
          python scraper/update_prices.py | tee update_output.txt
          if grep -q "PRICE CHANGES DETECTED" update_output.txt; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi
          rm update_output.txt

      - name: Commit and push changes
        if: steps.update.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date -u +%Y-%m-%d)
          git add data/ CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update LLM prices for $DATE"
          git push
